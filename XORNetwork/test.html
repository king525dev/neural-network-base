<!DOCTYPE html>
<html>
<head>
    <title>XOR Neural Network - Live Training</title>
    <style>
        /* Reset and fonts */
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #0f1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { font-weight: 300; font-size: 1.5rem; color: #58a6ff; margin-bottom: 5px; }
        .sub { color: #8b949e; font-size: 0.8rem; margin-bottom: 20px; }
        #container { background: #161b22; border-radius: 16px; padding: 20px; width: 100%; max-width: 800px; border: 1px solid #30363d; }
        canvas { display: block; width: 100%; height: auto; background: #0d1117; border-radius: 8px; cursor: default; }
        #console { 
            margin-top: 20px; background: #0d1117; border-radius: 8px; padding: 10px; 
            max-height: 150px; overflow-y: auto; font-size: 12px; border: 1px solid #21262d;
            font-family: monospace; white-space: pre-wrap; word-break: break-all;
        }
        #console span { color: #ff7b72; } /* Error/Loss */
        #console .weight { color: #58a6ff; } /* Blue weights */
        .status { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; }
        .badge { background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .loss-val { color: #f0883e; font-weight: bold; }
    </style>
</head>
<body>
    <div id="container">
        <h1>🧠 XOR Neural Network</h1>
        <div class="sub">Learning the exclusive OR function in real-time.</div>
        <canvas id="canvas" width="700" height="300"></canvas>
        <div class="status">
            <span class="badge">Epoch: <span id="epochDisplay">0</span></span>
            <span class="badge">Loss: <span id="lossDisplay" class="loss-val">1.000</span></span>
        </div>
        <div id="console">
            > Initializing network weights...
        </div>
    </div>
    <script>
        // All JavaScript goes here
    </script>
</body>
</html>
